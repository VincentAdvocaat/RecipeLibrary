trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release

steps:
- task: UseDotNet@2
  displayName: Use .NET 10 SDK
  inputs:
    packageType: sdk
    version: 10.x

- script: dotnet restore RecipeLibrary.slnx
  displayName: Restore

- script: dotnet build RecipeLibrary.slnx --configuration $(buildConfiguration) --no-restore
  displayName: Build

- script: dotnet test tests/RecipeLibrary.Application.Tests --configuration $(buildConfiguration) --no-build --verbosity normal
  displayName: Unit tests

- script: dotnet test tests/RecipeLibrary.Web.ComponentTests --configuration $(buildConfiguration) --no-build --verbosity normal
  displayName: Component tests

- script: dotnet test tests/RecipeLibrary.Web.IntegrationTests --configuration $(buildConfiguration) --no-build --verbosity normal
  displayName: Integration tests

- script: |
    pwsh tests/RecipeLibrary.Web.E2E.Tests/bin/$(buildConfiguration)/net10.0/playwright.ps1 install --with-deps chromium
    dotnet test tests/RecipeLibrary.Web.E2E.Tests --configuration $(buildConfiguration) --no-build --verbosity normal
  displayName: Playwright E2E tests
