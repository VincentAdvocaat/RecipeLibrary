trigger:
- main

# Do not run this pipeline on pull requests (CI/CD only on main + manual runs).
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
- name: deployNeu
  displayName: Deploy NEU (North Europe) - optional manual deploy
  type: boolean
  default: false

variables:
  buildConfiguration: Release
  projectName: recipelibrary
  ghcrImageRepository: ghcr.io/vincentadvocaat/recipelibrary
  # Per-region Azure service connections: RecipeLibrary-Azure-SEC, RecipeLibrary-Azure-NEU (see docs/azure/pipeline-setup.md).

stages:
- stage: Build
  displayName: Build and test
  jobs:
  - job: BuildAndTest
    displayName: Build, test, container image
    steps:
    - task: UseDotNet@2
      displayName: Use .NET 10 SDK
      inputs:
        packageType: sdk
        version: 10.x

    - script: dotnet restore RecipeLibrary.slnx
      displayName: Restore

    - script: dotnet build RecipeLibrary.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build

    - script: dotnet test tests/RecipeLibrary.Application.Tests --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: Unit tests

    - script: dotnet test tests/RecipeLibrary.Web.ComponentTests --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: Component tests

    - script: dotnet test tests/RecipeLibrary.Web.IntegrationTests --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: Integration tests

    - script: |
        set -euo pipefail
        docker build -f src/Web/RecipeLibrary.Web/Dockerfile -t "$(ghcrImageRepository):build-$(Build.BuildId)" .
      displayName: Build container image (validation)

    - script: |
        set -euo pipefail
        echo "$(GHCR_TOKEN)" | docker login ghcr.io -u "$(GHCR_USERNAME)" --password-stdin
        image_tag="$(ghcrImageRepository):$(Build.SourceVersion)"
        docker build -f src/Web/RecipeLibrary.Web/Dockerfile -t "$image_tag" .
        docker push "$image_tag"
        digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image_tag" | cut -d@ -f2)"
        echo "Published immutable digest: $digest"
        echo "##vso[task.setvariable variable=containerImageDigest;isOutput=true]$digest"
      name: PublishImage
      displayName: Publish container image to GHCR
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))

# SEC deploys automatically after Build on main (uses existing environment test-sec).
- stage: DeployTestSEC
  displayName: Deploy test SEC
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
  variables:
    containerImageDigest: $[ stageDependencies.Build.BuildAndTest.outputs['PublishImage.containerImageDigest'] ]
  jobs:
  - deployment: DeployTestSEC
    displayName: Deploy test SEC
    environment: test-sec
    variables:
      azureLocation: swedencentral
      resourceGroupName: rg-recipelibrary-test-sec
      environmentName: test-sec
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            displayName: Checkout repository

          - task: AzureCLI@2
            displayName: Deploy Bicep infrastructure
            inputs:
              azureSubscription: RecipeLibrary-Azure-SEC
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                az bicep install

                if [ -z "$(containerImageDigest)" ]; then
                  echo "containerImageDigest is empty. Ensure the GHCR publish step ran on main."
                  exit 1
                fi

                echo "Verifying resource group exists (pipeline does not create RGs)..."
                az group show --name "$(resourceGroupName)" >/dev/null

                deployment_name="main-$(Build.BuildId)"
                outputs="$(az deployment group create \
                  --name "$deployment_name" \
                  --resource-group "$(resourceGroupName)" \
                  --template-file infra/main.bicep \
                  --parameters \
                    location="$(azureLocation)" \
                    projectName="$(projectName)" \
                    environment="$(environmentName)" \
                    tenantId="$(AZURE_TENANT_ID)" \
                    entraAdminLogin="$(AZURE_ENTRA_ADMIN_LOGIN)" \
                    entraAdminObjectId="$(AZURE_ENTRA_ADMIN_OBJECT_ID)" \
                    ghcrImageRepository="$(ghcrImageRepository)" \
                    containerImageDigest="$(containerImageDigest)" \
                    ghcrUsername="$(GHCR_USERNAME)" \
                    ghcrPassword="$(GHCR_TOKEN)" \
                  --query properties.outputs -o json)"

                container_app_name="$(echo "$outputs" | jq -r '.containerAppName.value')"
                container_app_fqdn="$(echo "$outputs" | jq -r '.containerAppFqdn.value')"
                echo "Deployed Container App: $container_app_name"
                echo "Container App FQDN: $container_app_fqdn"
                echo "##vso[task.setvariable variable=containerAppName]$container_app_name"
                echo "##vso[task.setvariable variable=containerAppFqdn]$container_app_fqdn"

          - task: AzureCLI@2
            displayName: Smoke check (cold start tolerant)
            inputs:
              azureSubscription: RecipeLibrary-Azure-SEC
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                fqdn="$(containerAppFqdn)"
                if [ -z "$fqdn" ] || [ "$fqdn" = "null" ]; then
                  fqdn="$(az containerapp show --resource-group "$(resourceGroupName)" --name "$(containerAppName)" --query properties.configuration.ingress.fqdn -o tsv)"
                fi

                health_url="https://${fqdn}/health"
                home_url="https://${fqdn}/"
                echo "Health URL: $health_url"
                echo "Home URL: $home_url"

                max_attempts=30
                sleep_seconds=20
                for attempt in $(seq 1 "$max_attempts"); do
                  health_code="$(curl --silent --show-error --max-time 60 -o /dev/null -w "%{http_code}" "$health_url" || echo "000")"
                  echo "Attempt ${attempt}/${max_attempts}: GET /health -> HTTP ${health_code}"
                  if [ "$health_code" = "200" ]; then
                    home_code="$(curl --fail --silent --show-error --max-time 60 -o /dev/null -w "%{http_code}" "$home_url")"
                    echo "GET / -> HTTP ${home_code}"
                    if [ "$home_code" = "200" ]; then
                      echo "Smoke check passed."
                      exit 0
                    fi
                  fi
                  sleep "$sleep_seconds"
                done

                echo "Smoke check failed after ${max_attempts} attempts."
                echo "If this is the first deploy, run docs/azure/sql-grants.sql for the managed identity and redeploy."
                exit 1

# NEU does not run on automatic CI. Start it manually via Run pipeline and enable "Deploy NEU".
# Uses existing environment test-neu (no environment approval required for this pattern).
- stage: DeployTestNEU
  displayName: Deploy test NEU (manual)
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'), ${{ parameters.deployNeu }})
  variables:
    containerImageDigest: $[ stageDependencies.Build.BuildAndTest.outputs['PublishImage.containerImageDigest'] ]
  jobs:
  - deployment: DeployTestNEU
    displayName: Deploy test NEU
    environment: test-neu
