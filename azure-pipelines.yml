trigger:
- main

# Do not run this pipeline on pull requests (CI/CD only on main + manual runs).
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
- name: deployNeu
  displayName: Deploy NEU (North Europe) - optional manual deploy
  type: boolean
  default: false
- name: runStryker
  displayName: Run Stryker mutation pilot (opt-in, report-only)
  type: boolean
  default: false

variables:
  buildConfiguration: Release
  projectName: recipelibrary
  ghcrImageRepository: ghcr.io/vincentadvocaat/recipelibrary
  # Per-region Azure service connections: RecipeLibrary-Azure-SEC, RecipeLibrary-Azure-NEU (see docs/azure/pipeline-setup.md).

stages:
- stage: Build
  displayName: Build and test
  jobs:
  - job: BuildAndTest
    displayName: Build, test, container image
    steps:
    - task: UseDotNet@2
      displayName: Use .NET 10 SDK
      inputs:
        packageType: sdk
        version: 10.x

    - script: dotnet restore RecipeLibrary.slnx
      displayName: Restore

    - script: dotnet build RecipeLibrary.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build

    - script: dotnet test tests/RecipeLibrary.Application.Tests --configuration $(buildConfiguration) --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults/Coverage --settings tests/coverlet.runsettings
      displayName: Unit tests with coverage

    - task: PublishCodeCoverageResults@2
      displayName: Publish code coverage
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/Coverage/**/coverage.cobertura.xml'
        pathToSources: '$(Build.SourcesDirectory)/src'
        failIfCoverageEmpty: true

    - script: dotnet test tests/RecipeLibrary.Web.ComponentTests --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: Component tests

    - script: dotnet test tests/RecipeLibrary.Web.IntegrationTests --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: Integration tests

    - script: |
        set -euo pipefail
        docker build -f src/Web/RecipeLibrary.Web/Dockerfile -t "$(ghcrImageRepository):build-$(Build.BuildId)" .
      displayName: Build container image (validation)

    - script: |
        set -euo pipefail
        echo "$(GHCR_TOKEN)" | docker login ghcr.io -u "$(GHCR_USERNAME)" --password-stdin
        image_tag="$(ghcrImageRepository):$(Build.SourceVersion)"
        docker build -f src/Web/RecipeLibrary.Web/Dockerfile -t "$image_tag" .
        docker push "$image_tag"
        digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image_tag" | cut -d@ -f2)"
        echo "Published immutable digest: $digest"
        echo "##vso[task.setvariable variable=containerImageDigest;isOutput=true]$digest"
      name: PublishImage
      displayName: Publish container image to GHCR
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))

# Opt-in Stryker is a separate stage so failures never block Build → Deploy.
- stage: Stryker
  displayName: Stryker mutation pilot (opt-in)
  dependsOn: []
  condition: eq(${{ parameters.runStryker }}, true)
  jobs:
  - job: StrykerPilot
    displayName: Stryker mutation pilot
    steps:
    - task: UseDotNet@2
      displayName: Use .NET 10 SDK
      inputs:
        packageType: sdk
        version: 10.x

    - script: |
        set -euo pipefail
        dotnet tool restore
        pwsh -File ./scripts/run-stryker.ps1
      displayName: Run Stryker pilot

    - script: |
        set -euo pipefail
        mkdir -p tests/RecipeLibrary.Application.Tests/StrykerOutput
      displayName: Ensure Stryker output directory
      condition: succeededOrFailed()

    - task: PublishPipelineArtifact@1
      displayName: Publish Stryker reports
      condition: succeededOrFailed()
      continueOnError: true
      inputs:
        targetPath: tests/RecipeLibrary.Application.Tests/StrykerOutput
        artifact: stryker-reports

# SEC deploys automatically after Build on main (uses existing environment test-sec).
- stage: DeployTestSEC
  displayName: Deploy test SEC
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
  variables:
    containerImageDigest: $[ stageDependencies.Build.BuildAndTest.outputs['PublishImage.containerImageDigest'] ]
  jobs:
  - deployment: DeployTestSEC
    displayName: Deploy test SEC
    environment: test-sec
    variables:
      azureLocation: swedencentral
      resourceGroupName: rg-recipelibrary-test-sec
      environmentName: test-sec
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            displayName: Checkout repository

          - task: AzureCLI@2
            displayName: Deploy Bicep infrastructure
            inputs:
              azureSubscription: RecipeLibrary-Azure-SEC
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                az bicep install

                if [ -z "$(containerImageDigest)" ]; then
                  echo "containerImageDigest is empty. Ensure the GHCR publish step ran on main."
                  exit 1
                fi

                echo "Verifying resource group exists (pipeline does not create RGs)..."
                az group show --name "$(resourceGroupName)" >/dev/null

                deployment_name="main-$(Build.BuildId)"
                outputs="$(az deployment group create \
                  --name "$deployment_name" \
                  --resource-group "$(resourceGroupName)" \
                  --template-file infra/main.bicep \
                  --parameters \
                    location="$(azureLocation)" \
                    projectName="$(projectName)" \
                    environment="$(environmentName)" \
                    tenantId="$(AZURE_TENANT_ID)" \
                    entraAdminLogin="$(AZURE_ENTRA_ADMIN_LOGIN)" \
                    entraAdminObjectId="$(AZURE_ENTRA_ADMIN_OBJECT_ID)" \
                    ghcrImageRepository="$(ghcrImageRepository)" \
                    containerImageDigest="$(containerImageDigest)" \
                    ghcrUsername="$(GHCR_USERNAME)" \
                    ghcrPassword="$(GHCR_TOKEN)" \
                  --query properties.outputs -o json)"

                container_app_name="$(echo "$outputs" | jq -r '.containerAppName.value')"
                container_app_fqdn="$(echo "$outputs" | jq -r '.containerAppFqdn.value')"
                key_vault_name="$(echo "$outputs" | jq -r '.keyVaultName.value')"
                echo "Deployed Container App: $container_app_name"
                echo "Container App FQDN: $container_app_fqdn"
                echo "Key Vault: $key_vault_name"
                echo "##vso[task.setvariable variable=containerAppName]$container_app_name"
                echo "##vso[task.setvariable variable=containerAppFqdn]$container_app_fqdn"
                echo "##vso[task.setvariable variable=keyVaultName]$key_vault_name"

          - task: AzureCLI@2
            displayName: Smoke check (cold start tolerant)
            inputs:
              azureSubscription: RecipeLibrary-Azure-SEC
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                fqdn="$(containerAppFqdn)"
                if [ -z "$fqdn" ] || [ "$fqdn" = "null" ]; then
                  fqdn="$(az containerapp show --resource-group "$(resourceGroupName)" --name "$(containerAppName)" --query properties.configuration.ingress.fqdn -o tsv)"
                fi

                health_url="https://${fqdn}/health/live"
                home_url="https://${fqdn}/"
                readiness_url="https://${fqdn}/api/system/readiness"
                echo "Health URL: $health_url"
                echo "Home URL: $home_url"
                echo "Readiness URL: $readiness_url"

                max_attempts=30
                sleep_seconds=20
                for attempt in $(seq 1 "$max_attempts"); do
                  health_code="$(curl --silent --show-error --max-time 60 -o /dev/null -w "%{http_code}" "$health_url" || echo "000")"
                  echo "Attempt ${attempt}/${max_attempts}: GET /health/live -> HTTP ${health_code}"
                  if [ "$health_code" != "200" ]; then
                    sleep "$sleep_seconds"
                    continue
                  fi

                  home_headers="$(mktemp)"
                  home_code="$(curl --silent --show-error --max-time 60 -D "$home_headers" -o /dev/null -w "%{http_code}" "$home_url" || echo "000")"
                  location="$(awk 'tolower($1)=="location:" {print $2}' "$home_headers" | tr -d '\r')"
                  rm -f "$home_headers"
                  echo "GET / -> HTTP ${home_code} Location=${location:-none}"

                  if [ "$home_code" = "200" ]; then
                    echo "Smoke check passed (app ready)."
                    exit 0
                  fi

                  if [ "$home_code" = "302" ] && echo "$location" | grep -Eqi '/(starting|failed)(/|$|\?)'; then
                    readiness_body="$(curl --silent --show-error --max-time 60 "$readiness_url" || echo "")"
                    echo "GET /api/system/readiness -> ${readiness_body}"
                    if echo "$readiness_body" | grep -Eqi '"state"[[:space:]]*:[[:space:]]*"Failed"'; then
                      echo "Smoke check failed: persistence permanently failed (see /failed and app logs)."
                      exit 1
                    fi
                    if echo "$readiness_body" | grep -Eqi '"state"[[:space:]]*:[[:space:]]*"Ready"'; then
                      home_code="$(curl --silent --show-error --max-time 60 -o /dev/null -w "%{http_code}" "$home_url" || echo "000")"
                      echo "GET / (after Ready) -> HTTP ${home_code}"
                      if [ "$home_code" = "200" ]; then
                        echo "Smoke check passed."
                        exit 0
                      fi
                    else
                      echo "App is serving starting page; waiting for persistence Ready..."
                    fi
                  fi

                  sleep "$sleep_seconds"
                done

                echo "Smoke check failed after ${max_attempts} attempts."
                echo "If this is the first deploy, run docs/azure/sql-grants.sql for the managed identity and redeploy."
                exit 1

# NEU does not run on automatic CI. Start it manually via Run pipeline and enable "Deploy NEU".
# Uses existing environment test-neu (no environment approval required for this pattern).
- stage: DeployTestNEU
