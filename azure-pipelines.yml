  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'), ${{ parameters.deployNeu }})
  variables:
    containerImageDigest: $[ stageDependencies.Build.BuildAndTest.outputs['PublishImage.containerImageDigest'] ]
  jobs:
  - deployment: DeployTestNEU
    displayName: Deploy test NEU
