# Stage template: status or hibernate for one test region.
# Hibernate deletes Container Apps compute and pauses SQL; keeps SQL + Blob data.
parameters:
- name: statusOnly
  type: boolean
  default: false
- name: stageName
  type: string
- name: stageDisplayName
  type: string
- name: resourceGroupName
  type: string
- name: azureServiceConnection
  type: string
- name: adoEnvironment
  type: string
- name: projectName
  type: string
  default: recipelibrary

stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.stageDisplayName }}
  jobs:
  - job: Resolve
    displayName: Resolve resources
    steps:
    - task: AzureCLI@2
      name: ResolveResources
      displayName: Resolve Container App and Managed Environment
      inputs:
        azureSubscription: ${{ parameters.azureServiceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          rg="${{ parameters.resourceGroupName }}"

          echo "Resource group: $rg"
          az group show --name "$rg" >/dev/null

          # Current naming: ca-rl-<environment>-<suffix> (see infra/main.bicep).
          # Fall back to any Container App in the RG for older naming.
          app_name="$(az containerapp list \
            --resource-group "$rg" \
            --query "[?starts_with(name, 'ca-rl-')].name | [0]" \
            -o tsv)"
          if [ -z "$app_name" ]; then
            app_name="$(az containerapp list \
              --resource-group "$rg" \
              --query "[0].name" \
              -o tsv)"
          fi

          env_name="$(az containerapp env list \
            --resource-group "$rg" \
            --query "[?starts_with(name, 'cae-${{ parameters.projectName }}-')].name | [0]" \
            -o tsv)"
          if [ -z "$env_name" ]; then
            env_name="$(az containerapp env list \
              --resource-group "$rg" \
              --query "[0].name" \
              -o tsv)"
          fi

          echo "Container App: ${app_name:-<none>}"
          echo "Managed Environment: ${env_name:-<none>}"
          echo "##vso[task.setvariable variable=containerAppName;isOutput=true]${app_name}"
          echo "##vso[task.setvariable variable=managedEnvName;isOutput=true]${env_name}"

  - job: Status
    displayName: Status
    dependsOn: Resolve
    condition: and(succeeded(), eq('${{ parameters.statusOnly }}', true))
    variables:
      containerAppName: $[ dependencies.Resolve.outputs['ResolveResources.containerAppName'] ]
      managedEnvName: $[ dependencies.Resolve.outputs['ResolveResources.managedEnvName'] ]
    steps:
    - task: AzureCLI@2
      displayName: Show cost-relevant status
      inputs:
        azureSubscription: ${{ parameters.azureServiceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          rg="${{ parameters.resourceGroupName }}"

          echo "=== Container App ==="
          if [ -n "$(containerAppName)" ]; then
            az containerapp show \
              --resource-group "$rg" \
              --name "$(containerAppName)" \
              --query "{name:name, provisioningState:properties.provisioningState, runningStatus:properties.runningStatus, fqdn:properties.configuration.ingress.fqdn, minReplicas:properties.template.scale.minReplicas, maxReplicas:properties.template.scale.maxReplicas}" \
              -o jsonc
          else
            echo "No Container App (hibernated or not deployed)."
          fi

          echo "=== Managed Environment ==="
          if [ -n "$(managedEnvName)" ]; then
            az containerapp env show \
              --resource-group "$rg" \
              --name "$(managedEnvName)" \
              --query "{name:name, provisioningState:properties.provisioningState}" \
              -o jsonc
          else
            echo "No Managed Environment."
          fi

          echo "=== SQL databases (data retained) ==="
          sql_servers="$(az sql server list --resource-group "$rg" --query "[].name" -o tsv)"
          if [ -z "$sql_servers" ]; then
            echo "No SQL servers found."
          else
            for server in $sql_servers; do
              echo "Server: $server"
              az sql db list --resource-group "$rg" --server "$server" \
                --query "[?name!='master'].{name:name, status:status, sku:sku.name}" \
                -o jsonc
            done
          fi

          echo "=== Storage accounts (data retained) ==="
          az storage account list --resource-group "$rg" --query "[].{name:name, sku:sku.name, kind:kind}" -o jsonc

  - deployment: Hibernate
    displayName: Hibernate (delete compute, keep data)
    dependsOn: Resolve
    condition: and(succeeded(), eq('${{ parameters.statusOnly }}', false))
    environment: ${{ parameters.adoEnvironment }}
    variables:
      containerAppName: $[ dependencies.Resolve.outputs['ResolveResources.containerAppName'] ]
      managedEnvName: $[ dependencies.Resolve.outputs['ResolveResources.managedEnvName'] ]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Delete Container Apps compute; pause SQL; keep data
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                rg="${{ parameters.resourceGroupName }}"

                echo "Hibernate keeps: SQL server/databases, storage accounts, managed identities, budgets."
                echo "Hibernate deletes: Container App + Managed Environment (recreated by main deploy)."

                if [ -n "$(containerAppName)" ]; then
                  echo "Deleting Container App $(containerAppName) ..."
                  az containerapp delete \
                    --resource-group "$rg" \
                    --name "$(containerAppName)" \
                    --yes
                else
                  echo "No Container App to delete."
                fi

                if [ -n "$(managedEnvName)" ]; then
                  echo "Deleting Managed Environment $(managedEnvName) ..."
                  az containerapp env delete \
                    --resource-group "$rg" \
                    --name "$(managedEnvName)" \
                    --yes
                else
                  echo "No Managed Environment to delete."
                fi

                for server in $(az sql server list --resource-group "$rg" --query "[].name" -o tsv); do
                  for db in $(az sql db list --resource-group "$rg" --server "$server" --query "[?name!='master'].name" -o tsv); do
                    status="$(az sql db show --resource-group "$rg" --server "$server" --name "$db" --query status -o tsv)"
                    echo "SQL $server/$db status=$status"
                    if [ "$status" != "Paused" ]; then
                      echo "Pausing SQL database $server/$db ..."
                      az sql db pause --resource-group "$rg" --server "$server" --name "$db"
                    fi
                  done
                done

                echo "=== Remaining data resources ==="
                az sql server list --resource-group "$rg" --query "[].name" -o tsv
                az storage account list --resource-group "$rg" --query "[].name" -o tsv
                az identity list --resource-group "$rg" --query "[].name" -o tsv

                echo "Hibernate complete. To bring the app back: run azure-pipelines.yml for this region."
                echo "If cost-guard is deployed, redeploy infra/cost-guard.bicep after the Container App is back."
