# Manual cost-control pipeline (no CI trigger).
#
# Default run: hibernate compute (delete Container App + Managed Environment,
# pause SQL). SQL + Blob + managed identity stay. Restore via azure-pipelines.yml.
#
# Check "Status only" to inspect without changing anything.
trigger: none

pr: none

parameters:
- name: target
  displayName: Target region
  type: string
  default: sec
  values:
  - sec
  - neu
  - all
- name: statusOnly
  displayName: Status only (do not hibernate)
  type: boolean
  default: false

stages:
- ${{ if or(eq(parameters.target, 'sec'), eq(parameters.target, 'all')) }}:
  - template: pipelines/templates/control-region.yml
    parameters:
      statusOnly: ${{ parameters.statusOnly }}
      stageName: Control_SEC
      stageDisplayName: Control SEC (Sweden Central)
      resourceGroupName: rg-recipelibrary-test-sec
      azureServiceConnection: RecipeLibrary-Azure-SEC
      adoEnvironment: test-sec
      projectName: recipelibrary

- ${{ if or(eq(parameters.target, 'neu'), eq(parameters.target, 'all')) }}:
  - template: pipelines/templates/control-region.yml
    parameters:
      statusOnly: ${{ parameters.statusOnly }}
      stageName: Control_NEU
      stageDisplayName: Control NEU (North Europe)
      resourceGroupName: rg-recipelibrary-test-neu
      azureServiceConnection: RecipeLibrary-Azure-NEU
      adoEnvironment: test-neu
      projectName: recipelibrary
